[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.34"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
via_ir = false
ffi = false
fs_permissions = [
    {access = "read-write", path = "./deployments"},
    {access = "read", path = "./out"},
]
remappings = [
    "@chainlink/contracts-ccip/=lib/ccip/contracts/src/v0.8/",
    "@chainlink/local/=lib/chainlink-local/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[profile.ci]
verbosity = 3
fuzz = {runs = 1_000}

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "thousands"

[rpc_endpoints]
eth = "${ETH_RPC}"
sepolia = "${SEPOLIA_RPC}"
bsc = "${BSC_RPC}"
bsc_testnet = "${BSC_TESTNET_RPC}"

[etherscan]
eth = {key = "${ETHERSCAN_API_KEY}", chain = 1}
sepolia = {key = "${ETHERSCAN_API_KEY}", chain = 11_155_111}
bsc = {key = "${BSCSCAN_API_KEY}", chain = 56}
bsc_testnet = {key = "${BSCSCAN_API_KEY}", chain = 97}
