[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.34"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
via_ir = false
ffi = false
fs_permissions = [
    {access = "read-write", path = "./deployments"},
    {access = "read", path = "./out"},
]
# SECURITY: OPS-11 — remappings live ONLY here. A sibling `remappings.txt` was deleted
# because Foundry gives the .txt file precedence when both exist, so an edit to one
# but not the other would silently change resolution (most dangerous for the
# `@chainlink/contracts-ccip/` line which points at the pinned CCIP 1.6.1 ABI). Do not
# recreate `remappings.txt`.
#
# CCIP 1.6.x layout: contracts moved to smartcontractkit/chainlink-ccip (EVM under
# `chains/evm/contracts/`), and the shared/vendored sources (Ownable2StepMsgSender,
# IBurnMintERC20, ITypeAndVersion, and the vendored OZ at v4.8.3 + v5.0.2) live in the
# `@chainlink/contracts` (chainlink-evm) dependency — hence the two `@chainlink/...`
# remaps below. chainlink-evm vendors OpenZeppelin internally, so no extra OZ remap is
# needed for the library sources; `@openzeppelin/contracts/` is for THIS repo's own code.
remappings = [
    "@chainlink/contracts-ccip/=lib/chainlink-ccip/chains/evm/contracts/",
    "@chainlink/contracts/=lib/chainlink-evm/contracts/",
    "@chainlink/local/=lib/chainlink-local/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[profile.ci]
verbosity = 3
fuzz = {runs = 1_000}

# Invariant configuration — explicit override of Foundry defaults (256 runs / depth 15 /
# fail_on_revert = false). `fail_on_revert = true` ensures broken handler logic surfaces
# rather than silently degrading coverage. `depth = 50` is enough to reach interleaved
# `adversarialPoolBurn`/`ccipMint`/`ccipBurn` sequences that exercise the saturating-
# decrement branch. SECURITY: TEST-2 + OPS-4.
#
# Local default (`make test`) uses these settings. CI sets `FOUNDRY_PROFILE=ci` and picks
# up the [profile.ci.invariant] override below at runs=500/depth=100 (~4x the local depth
# coverage). Local runs are intentionally lighter so iteration stays fast; a green local
# `make test` does not imply a green CI run. See `.github/workflows/ci.yml`.
[invariant]
runs = 256
depth = 50
fail_on_revert = true

[profile.ci.invariant]
runs = 500
depth = 100
fail_on_revert = true

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "thousands"

[rpc_endpoints]
eth = "${ETH_RPC}"
sepolia = "${SEPOLIA_RPC}"
bsc = "${BSC_RPC}"
bsc_testnet = "${BSC_TESTNET_RPC}"

[etherscan]
eth = {key = "${ETHERSCAN_API_KEY}", chain = 1}
sepolia = {key = "${ETHERSCAN_API_KEY}", chain = 11_155_111}
bsc = {key = "${BSCSCAN_API_KEY}", chain = 56}
bsc_testnet = {key = "${BSCSCAN_API_KEY}", chain = 97}
