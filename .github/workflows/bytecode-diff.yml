name: bytecode-diff

# Enforces that Hardhat and Foundry produce byte-identical runtime bytecode
# for every production contract. The CBOR metadata trailer is stripped before
# comparison because it embeds an IPFS hash of the compiler metadata JSON,
# which legitimately differs between toolchains (different source path
# resolution and remappings) and is not part of the executed code.
#
# This workflow uses no fields from github.event.*, so the workflow-injection
# patterns (issue titles, PR bodies, commit messages, head_ref, etc.) do not
# apply here. All `run:` commands are static, fixed strings.
#
# Documented in SECURITY.md.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'contracts/**'
      - 'foundry.toml'
      - 'hardhat.config.ts'
      - 'scripts/check-bytecode.js'
      - '.github/workflows/bytecode-diff.yml'
      - 'package.json'
      - 'yarn.lock'

jobs:
  diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      # Yarn 4 is provisioned by corepack (bundled with Node since 16.9.x)
      # using the version pinned in `packageManager` in package.json.
      # Nothing under .yarn/ is committed — corepack downloads the yarn
      # release on first invocation.
      #
      # Why not setup-node's `cache: 'yarn'`? GitHub's ubuntu-latest image
      # pre-installs yarn classic 1.22, and setup-node queries `yarn config
      # get cacheFolder` *before* corepack is enabled. That query hits
      # yarn 1 and points at the wrong cache directory; later, yarn 1's
      # own `packageManager` policy refuses to run with `yarn@4.14.1`
      # declared, breaking the install. We enable corepack first, force
      # yarn 4.14.1 active (overriding the classic shim), then cache
      # yarn 4's project-local `.yarn/cache` directly via actions/cache.
      - name: Enable corepack and activate yarn 4.14.1
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
        run: |
          corepack enable
          corepack prepare yarn@4.14.1 --activate
          yarn --version

      - name: Restore yarn 4 cache
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install dependencies
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
        run: yarn install --immutable

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Compile (Hardhat + Foundry)
        run: yarn compile

      - name: Diff Hardhat vs Foundry runtime bytecode
        run: node scripts/check-bytecode.js
