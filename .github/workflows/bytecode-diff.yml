name: bytecode-diff

# Enforces that Hardhat and Foundry produce byte-identical runtime bytecode
# for every production contract. The CBOR metadata trailer is stripped before
# comparison because it embeds an IPFS hash of the compiler metadata JSON,
# which legitimately differs between toolchains (different source path
# resolution and remappings) and is not part of the executed code.
#
# This workflow uses no fields from github.event.*, so the workflow-injection
# patterns (issue titles, PR bodies, commit messages, head_ref, etc.) do not
# apply here. All `run:` commands are static, fixed strings.
#
# Documented in SECURITY.md.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'contracts/**'
      - 'foundry.toml'
      - 'hardhat.config.ts'
      - 'scripts/check-bytecode.js'
      - '.github/workflows/bytecode-diff.yml'
      - 'package.json'
      - 'yarn.lock'

jobs:
  diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      # Yarn 4 is pinned via .yarnrc.yml -> yarnPath, which points at a
      # committed binary in .yarn/releases/. Corepack (bundled with Node
      # since 16.9.x) is enabled so `yarn` on PATH delegates to that
      # binary; the npm registry never has to serve yarn itself.
      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        env:
          # Defensive: keep first-run yarn invocations non-interactive on
          # any future Node version that ships a corepack with the prompt
          # behaviour enabled by default.
          COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
        run: yarn install --immutable

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Compile (Hardhat + Foundry)
        run: yarn compile

      - name: Diff Hardhat vs Foundry runtime bytecode
        run: node scripts/check-bytecode.js
