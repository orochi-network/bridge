# Yarn version is provisioned by corepack via the `packageManager` field
# in package.json. Nothing under `.yarn/` is committed — see .gitignore.

# Suppress the single YN0060 warning about ethers@5.8.0 not satisfying
# @nomicfoundation/hardhat-ethers@3.x (which wants ethers@^6.14.0). The
# v6 plugin is pulled in transitively as a peer of hardhat-verify /
# toolbox-hardhat but is unused at runtime; ethers@5.8.0 is pinned
# deliberately via `resolutions` to match the v5 hardhat-ethers plugin
# we actually load. The packageExtensions block below already marks
# ethers as optional for @nomicfoundation/hardhat-ethers, which silences
# the descendant-side warning, but yarn still emits a project-side
# YN0060 about the deliberate pin — this filter quiets just that.
logFilters:
  - code: YN0060
    level: discard

# Use a real node_modules tree (not Plug'n'Play). Hardhat, hardhat-deploy,
# Foundry's resolution, and a few of the LayerZero toolbox packages all
# expect to be able to resolve files inside node_modules at runtime, so PnP
# is not workable for this project.
nodeLinker: node-modules

# Allow scripts (postinstall, etc.) for first-party LZ packages and Hardhat
# to wire up their CLIs. Yarn 4 disables postinstall by default for
# untrusted dependencies; re-enabling it here is the same trust level
# pnpm and npm grant by default, which is what this project ran under
# previously.
enableScripts: true

# Several upstream LayerZero packages declare peer dependencies on
# packages we do not use directly (Solidity adapters for Axelar / Chainlink
# / Optimism that ship with `@layerzerolabs/lz-evm-messagelib-v2` but that
# we do not compile against; `@ethersproject/*` subpackages already
# bundled by `ethers@5.8.0`; `@layerzerolabs/protocol-devtools` not
# referenced by anything we exercise). Mark them as optional so yarn does
# not log YN0002 warnings on every install for peers that are intentionally
# absent. If a future code path actually needs one of these, yarn will
# still surface the missing module at import time — only the install-time
# warning is suppressed.
packageExtensions:
  '@layerzerolabs/devtools-evm-hardhat@*':
    peerDependenciesMeta:
      '@ethersproject/abi':
        optional: true
      '@ethersproject/abstract-signer':
        optional: true
      '@ethersproject/contracts':
        optional: true
      '@ethersproject/providers':
        optional: true
  '@layerzerolabs/devtools-evm@*':
    peerDependenciesMeta:
      '@ethersproject/abi':
        optional: true
      '@ethersproject/abstract-provider':
        optional: true
      '@ethersproject/abstract-signer':
        optional: true
      '@ethersproject/address':
        optional: true
      '@ethersproject/bignumber':
        optional: true
      '@ethersproject/constants':
        optional: true
      '@ethersproject/contracts':
        optional: true
      '@ethersproject/providers':
        optional: true
  '@layerzerolabs/devtools@*':
    peerDependenciesMeta:
      '@ethersproject/bytes':
        optional: true
  '@layerzerolabs/lz-evm-messagelib-v2@*':
    peerDependenciesMeta:
      '@axelar-network/axelar-gmp-sdk-solidity':
        optional: true
      '@chainlink/contracts-ccip':
        optional: true
      '@eth-optimism/contracts':
        optional: true
  '@layerzerolabs/ua-devtools@*':
    peerDependenciesMeta:
      '@layerzerolabs/protocol-devtools':
        optional: true
  # @nomicfoundation/hardhat-ethers@3.x is the ethers-v6 plugin. It is
  # pulled in transitively as a peer of @nomicfoundation/hardhat-verify
  # and @layerzerolabs/toolbox-hardhat, so it must remain installed, but
  # this project deliberately uses the v5 plugin
  # (@nomiclabs/hardhat-ethers@2.2.3) with ethers@5.8.0 pinned via
  # `resolutions`. Mark the v6 plugin's ethers peer optional so yarn does
  # not flag the deliberate version pin as a peer mismatch.
  '@nomicfoundation/hardhat-ethers@*':
    peerDependenciesMeta:
      ethers:
        optional: true
  # @layerzerolabs/eslint-config-next is the project's eslint preset and
  # is supposed to forward `typescript` to its typescript-eslint plugins
  # via its own peerDependencies. It does not — yarn flags it. Mark
  # typescript as optional on the eslint-config so the descendant plugins
  # fall back to the project-root typescript@5.9.3 at runtime (which is
  # what they actually do).
  '@layerzerolabs/eslint-config-next@*':
    peerDependenciesMeta:
      typescript:
        optional: true
