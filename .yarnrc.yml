# Use a real node_modules tree (not Plug'n'Play). Hardhat, hardhat-deploy,
# Foundry's resolution, and a few of the LayerZero toolbox packages all
# expect to be able to resolve files inside node_modules at runtime, so PnP
# is not workable for this project.
nodeLinker: node-modules

# Allow scripts (postinstall, etc.) for first-party LZ packages and Hardhat
# to wire up their CLIs. Yarn 4 disables postinstall by default for
# untrusted dependencies.
enableScripts: true
